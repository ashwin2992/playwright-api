name: Execute Playwright API Tests on Github Actions with Allure Reports

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright tests (Shard ${{ matrix.shard }})
        run: npx playwright test --shard=${{ matrix.shard }}/4
        continue-on-error: true

      - name: Upload Allure results (Shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results
          if-no-files-found: warn

  merge-allure-report:
    needs: playwright-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results

      - name: Merge Allure results
        run: |
          mkdir merged-results
          find allure-results -type f -exec cp {} merged-results \;

      - name: Generate final Allure report
        run: allure generate merged-results --clean -o allure-report

      - name: Upload final Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-final
          path: allure-report
