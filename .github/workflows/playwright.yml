name: Execute Playwright API Tests on Github Actions with Allure Reports

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard:
          - 1
          - 2
          - 3
          - 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (Shard ${{ matrix.shard }})
        run: npx playwright test --shard=${{ matrix.shard }}/4
        continue-on-error: true

      - name: Verify Allure Results
        if: always()
        run: |
          echo "Current directory:"
          pwd

          echo "Allure Results:"
          find allure-results || true

      - name: Upload Allure results (Shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results
          if-no-files-found: error

  merge-allure-report:
    needs: playwright-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-results

      - name: Show Downloaded Files
        run: |
          echo "Downloaded Artifacts"
          find downloaded-results

      - name: Merge Allure Results
        run: |
          mkdir -p merged-results

          find downloaded-results -name "*.json" -exec cp {} merged-results/ \;
          find downloaded-results -name "*.txt" -exec cp {} merged-results/ \;
          find downloaded-results -name "*.png" -exec cp {} merged-results/ \;
          find downloaded-results -name "*.attach" -exec cp {} merged-results/ \; || true

          echo "Merged Files"
          ls -R merged-results

      - name: Generate Allure Report
        run: |
          allure generate merged-results --clean -o allure-report

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-final
          path: allure-report