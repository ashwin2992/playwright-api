image: mcr.microsoft.com/playwright:v1.61.0-noble

stages:
  - test

cache:
  paths:
    - node_modules/

before_script:
  - npm ci
  - npx playwright install --with-deps

playwright-api-test:
  stage: test

  script:
    - npx playwright test --project=api-tests-javascript
    - allure generate allure-results --clean -o allure-report

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - playwright-report/
      - allure-results/
      - allure-report/
      - results.xml
      - results.json






